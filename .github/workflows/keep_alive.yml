name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping LabTrack
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://labtrack.streamlit.app)
          echo "LabTrack response: $response."
        continue-on-error: true
